<!--
  Kajabi embed for the Foodie Coaches Marketing AI.

  Paste this into a Custom Code / HTML block on the member page in the Kajabi editor.
  The iframe load sends Sec-Fetch-Dest: iframe and a Referer from the Kajabi host, so the
  Worker's gate serves the tool. A direct visit to the Worker URL (no iframe, no Kajabi
  Referer) shows the friendly block page instead - that is the correct behaviour.

  If you rename the tool/domain before launch, update the src below to match the new host
  (and the wrangler route + DNS record). Nothing else changes.
-->
<div class="fc-marketing-ai-embed" style="max-width:720px;margin:0 auto;">
  <iframe
    src="https://marketing-assistant-ai.foodiecoaches.com/"
    title="Foodie Coaches Marketing AI"
    loading="lazy"
    style="width:100%;height:80vh;min-height:560px;border:0;border-radius:16px;background:#FAF7F2;"
    referrerpolicy="origin-when-cross-origin"
    allow="clipboard-write"></iframe>
</div>
